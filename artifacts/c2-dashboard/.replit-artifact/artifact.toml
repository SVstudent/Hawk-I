kind = "web"
previewPath = "/"
title = "C2 Dashboard"
version = "1.0.0"
id = "artifacts/c2-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22809

[services.development]
run = "pnpm --filter @workspace/c2-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/c2-dashboard", "run", "build" ]
publicDir = "artifacts/c2-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22809"
BASE_PATH = "/"
